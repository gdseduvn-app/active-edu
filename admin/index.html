<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text y='75' x='50' text-anchor='middle' font-size='65' font-family='sans-serif'>⚡</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ActiveEdu Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:linear-gradient(135deg,#2563eb,#4338ca);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#fff;border-radius:20px;padding:44px;width:380px;box-shadow:0 24px 80px rgba(0,0,0,.3);text-align:center}
.logo-icon{width:48px;height:48px;background:#2563eb;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 12px}
.logo-name{font-size:22px;font-weight:700;color:#1e293b;margin-bottom:4px}
.logo-name span{color:#2563eb}
.logo-sub{font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase}
p{color:#64748b;font-size:14px;margin:24px 0 20px;line-height:1.6}
.btn{display:inline-block;padding:12px 28px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;transition:background .15s}
.btn:hover{background:#1d4ed8}
</style>
</head>
<body>
<div class="box">
  <div class="logo-icon">⚡</div>
  <div class="logo-name">Active<span>Edu</span></div>
  <div class="logo-sub">Admin Dashboard</div>
  <p>Đăng nhập bằng tài khoản admin từ trang chính để truy cập dashboard.</p>
  <a href="../index.html" class="btn">Đến trang đăng nhập →</a>
</div>

<script>
// Nếu đã có session admin hợp lệ → chuyển thẳng vào dashboard
(function() {
  // Kiểm tra sessionStorage (token từ /admin/auth hoặc unified login)
  if (sessionStorage.getItem('ae_admin_token')) {
    window.location.replace('dashboard.html');
    return;
  }
  // Kiểm tra localStorage ae_user với role=admin
  try {
    var u = JSON.parse(localStorage.getItem('ae_user') || 'null');
    if (u && u.role === 'admin' && u.token && u.expiresAt > Date.now()) {
      sessionStorage.setItem('ae_auth', '1');
      sessionStorage.setItem('ae_admin_token', u.token);
      window.location.replace('dashboard.html');
    }
  } catch(e) {}
})();
</script>
</body>
</html>
