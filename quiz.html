<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<title>Bài kiểm tra — ActiveEdu</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F46E5'/><text y='75' x='50' text-anchor='middle' font-size='65' font-family='sans-serif'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --primary:       #4F46E5;
  --primary-d:     #4338CA;
  --primary-l:     #EEF2FF;
  --success:       #10B981;
  --success-l:     #D1FAE5;
  --danger:        #EF4444;
  --danger-l:      #FEE2E2;
  --warning:       #F59E0B;
  --warning-l:     #FEF3C7;
  --bg:            #F8FAFC;
  --card:          #FFFFFF;
  --border:        #E2E8F0;
  --text:          #0F172A;
  --text-muted:    #64748B;
  --text-subtle:   #94A3B8;
  --radius:        12px;
  --radius-lg:     16px;
  --shadow-sm:     0 1px 3px rgba(0,0,0,.08);
  --shadow-md:     0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:     0 8px 32px rgba(0,0,0,.12);
  --shadow-xl:     0 20px 60px rgba(0,0,0,.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.quiz-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 1px 0 var(--border), var(--shadow-sm);
}
.header-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: inherit; flex-shrink: 0;
}
.header-logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), #7C3AED);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; box-shadow: 0 2px 8px rgba(79,70,229,.3);
}
.header-logo-name {
  font-size: 15px; font-weight: 700; color: var(--text);
}
.header-divider {
  width: 1px; height: 20px; background: var(--border); flex-shrink: 0;
}
.header-title {
  flex: 1; font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-meta {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.save-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-muted);
}
.save-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--text-subtle);
  transition: background 0.3s;
}
.save-dot.saving { background: var(--warning); animation: pulse 0.8s infinite; }
.save-dot.saved { background: var(--success); }

/* ── TIMER ── */
.timer-chip {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px; border-radius: 999px;
  background: var(--card); border: 1.5px solid var(--border);
  font-size: 15px; font-weight: 700; letter-spacing: 1.5px;
  font-variant-numeric: tabular-nums;
  box-shadow: var(--shadow-sm);
  transition: all 0.3s;
}
.timer-chip .fa-clock { font-size: 13px; color: var(--text-muted); }
.timer-chip.warn {
  background: var(--warning-l); border-color: #FCD34D;
  color: #92400E;
}
.timer-chip.danger {
  background: var(--danger-l); border-color: #FCA5A5;
  color: #991B1B;
  animation: timerPulse 0.7s ease-in-out infinite;
}
@keyframes timerPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── SHELL ── */
.quiz-shell {
  max-width: 760px; margin: 0 auto;
  padding: 32px 20px 100px;
}

/* ── PROGRESS ── */
.progress-section { margin-bottom: 24px; }
.progress-meta {
  display: flex; justify-content: space-between;
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  margin-bottom: 8px;
}
.progress-bar-wrap {
  height: 6px; background: var(--border); border-radius: 999px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), #7C3AED);
  border-radius: 999px;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}

/* ── QUESTION CARD ── */
.q-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.q-card.answered {
  border-color: #A7F3D0;
  box-shadow: 0 0 0 3px rgba(16,185,129,.06);
}
.q-card-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.q-number {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--primary-l); color: var(--primary);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.q-card.answered .q-number {
  background: var(--success-l); color: var(--success);
}
.q-meta { display: flex; align-items: center; gap: 8px; flex: 1; }
.q-points {
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 999px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-muted);
}
.q-required-tag {
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 999px;
  background: #FEF3C7; border: 1px solid #FDE68A; color: #92400E;
}
.q-content {
  font-size: 15px; font-weight: 500; line-height: 1.7;
  color: var(--text); margin-bottom: 18px;
}

/* ── OPTIONS (MCQ) ── */
.opt-list { display: flex; flex-direction: column; gap: 8px; }
.opt-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: 10px;
  border: 1.5px solid var(--border);
  cursor: pointer; transition: all 0.15s;
  user-select: none; position: relative; overflow: hidden;
}
.opt-item::before {
  content: ''; position: absolute; inset: 0;
  background: var(--primary); opacity: 0; transition: opacity 0.15s;
}
.opt-item:hover { border-color: #A5B4FC; background: var(--primary-l); }
.opt-item.selected {
  border-color: var(--primary); background: var(--primary-l);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}
.opt-letter {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--bg); border: 1.5px solid var(--border);
  font-size: 12px; font-weight: 700; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.opt-item.selected .opt-letter {
  background: var(--primary); border-color: var(--primary);
  color: #fff;
}
.opt-text { font-size: 14px; font-weight: 500; flex: 1; position: relative; }
.opt-item input[type=radio] { display: none; }
.opt-check {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s; position: relative;
}
.opt-item.selected .opt-check {
  border-color: var(--primary); background: var(--primary);
}
.opt-item.selected .opt-check::after {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff;
}

/* ── TRUE/FALSE ── */
.tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.tf-option {
  padding: 16px; border-radius: 10px; border: 1.5px solid var(--border);
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-size: 14px; font-weight: 600; user-select: none;
}
.tf-option:hover { background: var(--bg); }
.tf-option.true-opt:hover { border-color: #6EE7B7; background: #F0FDF4; }
.tf-option.false-opt:hover { border-color: #FCA5A5; background: #FFF5F5; }
.tf-option.selected-true {
  border-color: var(--success); background: var(--success-l);
  color: #065F46; box-shadow: 0 0 0 3px rgba(16,185,129,.1);
}
.tf-option.selected-false {
  border-color: var(--danger); background: var(--danger-l);
  color: #991B1B; box-shadow: 0 0 0 3px rgba(239,68,68,.1);
}
.tf-icon { font-size: 20px; }

/* ── TEXT INPUT ── */
.q-textarea {
  width: 100%; min-height: 120px; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-family: inherit; font-size: 14px; line-height: 1.6;
  resize: vertical; outline: none; transition: all 0.15s;
  color: var(--text); background: var(--card);
}
.q-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }

.q-input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-family: inherit; font-size: 14px; outline: none;
  transition: all 0.15s; color: var(--text);
}
.q-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }

/* ── RATING ── */
.rating-wrap { display: flex; gap: 8px; align-items: center; }
.star-btn {
  width: 40px; height: 40px; border-radius: 10px; border: none;
  background: var(--bg); cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.star-btn:hover { background: #FEF3C7; transform: scale(1.1); }
.star-btn.active { background: #FEF3C7; transform: scale(1.05); }
.rating-label { font-size: 13px; color: var(--text-muted); margin-left: 4px; }

/* ── NAVIGATOR ── */
.navigator-section { margin-top: 24px; }
.navigator-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-subtle); margin-bottom: 10px;
}
.q-nav-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.q-nav-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--card);
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: all 0.15s; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
}
.q-nav-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-l); }
.q-nav-btn.answered {
  background: var(--primary); border-color: var(--primary);
  color: #fff; box-shadow: 0 2px 6px rgba(79,70,229,.3);
}
.q-nav-btn.current {
  border-color: var(--primary); color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.2);
}
.q-nav-btn.answered.current {
  box-shadow: 0 2px 6px rgba(79,70,229,.3), 0 0 0 3px rgba(79,70,229,.25);
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  box-shadow: 0 -4px 20px rgba(0,0,0,.06);
}
.bottom-progress-text {
  font-size: 13px; color: var(--text-muted);
}
.bottom-progress-text b { color: var(--text); font-weight: 700; }
.bottom-actions { display: flex; gap: 8px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 18px; border-radius: 8px;
  font-size: 14px; font-weight: 600; border: none;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
  text-decoration: none; white-space: nowrap;
}
.btn-primary {
  background: var(--primary); color: #fff;
  box-shadow: 0 2px 8px rgba(79,70,229,.3);
}
.btn-primary:hover {
  background: var(--primary-d);
  box-shadow: 0 4px 12px rgba(79,70,229,.4);
  transform: translateY(-1px);
}
.btn-secondary {
  background: var(--card); color: var(--text);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.btn-secondary:hover { background: var(--bg); border-color: #A5B4FC; }
.btn-success {
  background: var(--success); color: #fff;
  box-shadow: 0 2px 8px rgba(16,185,129,.3);
}
.btn-success:hover {
  background: #059669;
  box-shadow: 0 4px 12px rgba(16,185,129,.4);
  transform: translateY(-1px);
}
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #DC2626; transform: translateY(-1px); }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-lg { padding: 13px 24px; font-size: 15px; }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

/* ── COVER PAGE ── */
.cover-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px;
  box-shadow: var(--shadow-md); margin-top: 16px;
}
.cover-type-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); color: var(--text-muted); background: var(--bg);
  margin-bottom: 14px;
}
.cover-title {
  font-size: 26px; font-weight: 800; color: var(--text);
  line-height: 1.3; margin-bottom: 10px;
}
.cover-desc {
  font-size: 14px; color: var(--text-muted); line-height: 1.7;
  margin-bottom: 20px;
}
.cover-meta-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px; margin-bottom: 24px;
}
.cover-meta-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: 10px;
  background: var(--bg); border: 1px solid var(--border);
}
.cover-meta-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--primary-l); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.cover-meta-val { font-size: 13px; font-weight: 600; color: var(--text); }
.cover-meta-lbl { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.cover-notice {
  padding: 14px 16px; background: #EEF2FF; border-radius: 10px;
  border-left: 3px solid var(--primary);
  font-size: 13px; line-height: 1.7; color: #3730A3;
  margin-bottom: 24px;
}
.cover-code-wrap { margin-bottom: 20px; }
.cover-code-label {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px;
}
.cover-code-input {
  padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 15px; font-weight: 600; letter-spacing: 2px;
  font-family: inherit; outline: none; width: 100%; max-width: 240px;
  transition: all 0.15s;
}
.cover-code-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
.cover-actions { display: flex; gap: 12px; flex-wrap: wrap; }

/* ── RESULT PAGE ── */
.result-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px; text-align: center;
  box-shadow: var(--shadow-md); margin-top: 16px;
}
.result-emoji { font-size: 56px; margin-bottom: 8px; display: block; }
.result-heading { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
.result-score-wrap {
  display: inline-flex; align-items: baseline; gap: 4px;
  margin: 4px 0 8px;
}
.result-score {
  font-size: 72px; font-weight: 900; line-height: 1;
}
.result-score.pass { color: var(--success); }
.result-score.fail { color: var(--danger); }
.result-score-max { font-size: 24px; color: var(--text-muted); font-weight: 700; }
.result-pct { font-size: 16px; color: var(--text-muted); margin-bottom: 28px; }

.result-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin: 24px 0;
}
.result-stat {
  padding: 16px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px;
}
.result-stat .val { font-size: 22px; font-weight: 800; color: var(--text); }
.result-stat .lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.result-actions {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-top: 28px;
}

/* ── REVIEW ── */
.review-section { text-align: left; margin-top: 28px; }
.review-heading {
  font-size: 16px; font-weight: 700; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.review-item {
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 16px; margin-bottom: 10px; transition: border-color 0.2s;
}
.review-item.correct { border-color: #6EE7B7; background: #F0FDF4; }
.review-item.wrong { border-color: #FCA5A5; background: #FFF5F5; }
.review-item-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.review-badge {
  width: 22px; height: 22px; border-radius: 6px; font-size: 12px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.review-item.correct .review-badge { background: var(--success-l); color: var(--success); }
.review-item.wrong .review-badge { background: var(--danger-l); color: var(--danger); }
.review-q-text { font-size: 14px; font-weight: 500; color: var(--text); }
.review-answers { margin-top: 8px; font-size: 13px; }
.review-answers span { color: var(--text-muted); }
.review-answers b { color: var(--text); }
.review-correct-ans { color: var(--success) !important; font-weight: 600; }

/* ── LOADING ── */
.loader {
  position: fixed; inset: 0; background: rgba(255,255,255,.9);
  backdrop-filter: blur(4px); display: none;
  align-items: center; justify-content: center; z-index: 999;
  flex-direction: column; gap: 14px;
}
.loader.show { display: flex; }
.loader-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
.loader-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ERROR / EMPTY ── */
.error-card {
  max-width: 420px; margin: 80px auto; text-align: center;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 48px 36px;
  box-shadow: var(--shadow-md);
}
.error-icon { font-size: 48px; margin-bottom: 16px; display: block; }
.error-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.error-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }

/* ── TOAST ── */
.toast-wrap {
  position: fixed; top: 16px; right: 16px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; border-radius: 10px;
  font-size: 13px; font-weight: 500; max-width: 360px;
  box-shadow: var(--shadow-lg); pointer-events: all;
  animation: toastIn 0.25s cubic-bezier(.34,1.28,.64,1);
  backdrop-filter: blur(8px);
}
.toast.success { background: #064E3B; color: #D1FAE5; }
.toast.error { background: #7F1D1D; color: #FEE2E2; }
.toast.info { background: #1E1B4B; color: #E0E7FF; }
.toast.warn { background: #78350F; color: #FEF3C7; }
.toast-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.toast-msg { flex: 1; line-height: 1.4; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(16px) scale(0.95); }
  to   { opacity: 1; transform: none; }
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .quiz-shell { padding: 20px 14px 100px; }
  .cover-card { padding: 28px 20px; }
  .cover-meta-grid { grid-template-columns: 1fr 1fr; }
  .result-card { padding: 28px 20px; }
  .result-stats { grid-template-columns: 1fr 1fr; }
  .result-score { font-size: 56px; }
  .quiz-header { padding: 0 16px; }
  .bottom-bar { padding: 10px 16px; }
  .tf-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text" id="loader-text">Đang tải bài kiểm tra...</div>
</div>

<!-- Header -->
<header class="quiz-header" id="quiz-header" style="display:none">
  <a class="header-logo" href="/">
    <div class="header-logo-icon">📋</div>
    <span class="header-logo-name">ActiveEdu</span>
  </a>
  <div class="header-divider"></div>
  <div class="header-title" id="header-title">Bài kiểm tra</div>
  <div class="header-meta">
    <div class="save-indicator" id="save-indicator">
      <div class="save-dot" id="save-dot"></div>
      <span id="save-label">Tự động lưu</span>
    </div>
    <div class="timer-chip" id="timer-chip" style="display:none">
      <i class="fas fa-clock"></i>
      <span id="timer-display">--:--</span>
    </div>
  </div>
</header>

<!-- Toast container -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- Main content -->
<div class="quiz-shell" id="quiz-shell">
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:80px 20px;color:var(--text-muted)">
    <div class="loader-spinner"></div>
    <p style="font-size:14px">Đang tải bài kiểm tra...</p>
  </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar" id="bottom-bar" style="display:none">
  <div class="bottom-progress-text">
    Đã trả lời <b id="answered-count">0</b> / <b id="total-count">0</b> câu
  </div>
  <div class="bottom-actions">
    <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="navQuestion(-1)">
      <i class="fas fa-chevron-left"></i> Trước
    </button>
    <button class="btn btn-secondary btn-sm" id="btn-next" onclick="navQuestion(1)">
      Sau <i class="fas fa-chevron-right"></i>
    </button>
    <button class="btn btn-success" id="btn-submit" onclick="confirmSubmit()" style="display:none">
      <i class="fas fa-paper-plane"></i> Nộp bài
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const PROXY = 'https://api.gds.edu.vn';
const TOKEN_KEY = 'ae_token';
const LS_PREFIX = 'quiz_autosave_';

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let S = {
  phase: 'loading',
  assessId: null, assess: null, questions: [],
  submission: null, answers: {}, currentQ: 0,
  timerInterval: null, secondsLeft: null,
  autoSaveTimer: null, token: null, userId: null,
  _saveDebounce: null,
};

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(async function init() {
  const sp = new URLSearchParams(location.search);
  S.assessId = parseInt(sp.get('id') || location.pathname.split('/').filter(Boolean).pop());
  if (!S.assessId || isNaN(S.assessId)) return showError('Không tìm thấy bài kiểm tra.', 'Vui lòng kiểm tra đường dẫn.');

  S.token = localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(TOKEN_KEY);
  if (!S.token) return showError('Chưa đăng nhập', 'Vui lòng <a href="/" style="color:var(--primary)">đăng nhập</a> để làm bài.');

  try { const p = JSON.parse(atob(S.token.split('.')[1])); S.userId = p.userId || p.sub || p.id; } catch {}

  loader(true, 'Đang tải bài kiểm tra...');
  try {
    const data = await api(`/api/assessments/${S.assessId}`);
    S.assess = data; S.questions = data.questions || [];
    loader(false);
    showCover();
  } catch(e) { loader(false); showError('Lỗi tải bài', e.message); }
})();

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function api(url, opts = {}) {
  const r = await fetch(`${PROXY}${url}`, {
    headers: { 'Authorization': `Bearer ${S.token}`, 'Content-Type': 'application/json' },
    ...opts,
  });
  const text = await r.text();
  let data; try { data = JSON.parse(text); } catch { data = { error: text }; }
  if (!r.ok) throw new Error(data?.error || `HTTP ${r.status}`);
  return data;
}

// ═══════════════════════════════════════════════════════════
// COVER
// ═══════════════════════════════════════════════════════════
function showCover() {
  S.phase = 'cover';
  const a = S.assess;
  const TYPE_MAP = {
    graded_quiz:     { label: 'Trắc nghiệm có điểm', icon: '📝' },
    practice_quiz:   { label: 'Quiz luyện tập',       icon: '🔄' },
    graded_survey:   { label: 'Khảo sát có điểm',     icon: '📊' },
    ungraded_survey: { label: 'Khảo sát ẩn danh',     icon: '🕵️' },
  };
  const type = TYPE_MAP[a.assessmentType] || { label: a.assessmentType, icon: '📋' };
  const isAnon = a.assessmentType === 'ungraded_survey';

  render(`
    <div class="cover-card">
      <div class="cover-type-tag">${type.icon} ${type.label}</div>
      <h1 class="cover-title">${esc(a.title)}</h1>
      ${a.description ? `<p class="cover-desc">${esc(a.description)}</p>` : ''}

      <div class="cover-meta-grid">
        <div class="cover-meta-item">
          <div class="cover-meta-icon"><i class="fas fa-circle-question"></i></div>
          <div>
            <div class="cover-meta-val">${S.questions.length} câu</div>
            <div class="cover-meta-lbl">Số câu hỏi</div>
          </div>
        </div>
        <div class="cover-meta-item">
          <div class="cover-meta-icon"><i class="fas fa-clock"></i></div>
          <div>
            <div class="cover-meta-val">${a.timeLimitMinutes ? `${a.timeLimitMinutes} phút` : 'Không giới hạn'}</div>
            <div class="cover-meta-lbl">Thời gian</div>
          </div>
        </div>
        <div class="cover-meta-item">
          <div class="cover-meta-icon"><i class="fas fa-rotate"></i></div>
          <div>
            <div class="cover-meta-val">${a.maxAttempts ? `${a.maxAttempts} lần` : 'Không giới hạn'}</div>
            <div class="cover-meta-lbl">Số lần làm</div>
          </div>
        </div>
        ${a.availableUntil ? `
        <div class="cover-meta-item">
          <div class="cover-meta-icon"><i class="fas fa-calendar-xmark"></i></div>
          <div>
            <div class="cover-meta-val" style="font-size:12px">${new Date(a.availableUntil).toLocaleDateString('vi-VN')}</div>
            <div class="cover-meta-lbl">Hạn nộp</div>
          </div>
        </div>` : ''}
      </div>

      <div class="cover-notice">
        ${isAnon ? '🕵️ <b>Khảo sát ẩn danh</b> — câu trả lời không được liên kết với danh tính của bạn.<br>' : ''}
        ${a.timeLimitMinutes ? `⏱️ Đồng hồ đếm ngược sẽ bắt đầu khi bạn nhấn <b>Bắt đầu</b>.<br>` : ''}
        💾 Bài làm được tự động lưu mỗi 15 giây và khi chuyển câu.
      </div>

      ${a.requiresAccessCode ? `
        <div class="cover-code-wrap">
          <div class="cover-code-label"><i class="fas fa-key"></i> Mã tham gia</div>
          <input id="access-code-input" class="cover-code-input" type="text"
            placeholder="Nhập mã..." autocomplete="off" maxlength="20">
        </div>` : ''}

      <div class="cover-actions">
        <button class="btn btn-primary btn-lg" onclick="startQuiz()">
          <i class="fas fa-play"></i> Bắt đầu làm bài
        </button>
        <a href="javascript:history.back()" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Quay lại
        </a>
      </div>
    </div>
  `);
}

// ═══════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════
async function startQuiz() {
  const code = document.getElementById('access-code-input')?.value.trim() || '';
  loader(true, 'Đang khởi tạo bài làm...');
  try {
    const body = {}; if (code) body.accessCode = code;
    const data = await api(`/api/assessments/${S.assessId}/start`, { method: 'POST', body: JSON.stringify(body) });
    S.submission = data.submission;
    if (data.savedAnswers) S.answers = data.savedAnswers;
    else { try { const lc = localStorage.getItem(`${LS_PREFIX}${S.submission.id}`); if (lc) S.answers = JSON.parse(lc).answers || {}; } catch {} }
    loader(false);
    beginQuiz();
  } catch(e) { loader(false); showToast(e.message, 'error'); }
}

// ═══════════════════════════════════════════════════════════
// BEGIN QUIZ
// ═══════════════════════════════════════════════════════════
function beginQuiz() {
  S.phase = 'quiz'; S.currentQ = 0;
  document.getElementById('quiz-header').style.display = 'flex';
  document.getElementById('header-title').textContent = S.assess.title;
  document.getElementById('bottom-bar').style.display = 'flex';
  document.getElementById('btn-submit').style.display = '';

  if (S.assess.timeLimitMinutes) {
    document.getElementById('timer-chip').style.display = 'flex';
    const elapsed = S.submission?.elapsedSeconds || 0;
    S.secondsLeft = S.assess.timeLimitMinutes * 60 - elapsed;
    if (S.secondsLeft <= 0) { autoSubmit(); return; }
    updateTimer();
    S.timerInterval = setInterval(tickTimer, 1000);
  }

  S.autoSaveTimer = setInterval(autoSave, 15000);
  document.addEventListener('visibilitychange', onVisibility);
  window.addEventListener('beforeunload', onUnload);
  renderQuiz();
}

// ═══════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════
function tickTimer() {
  S.secondsLeft--;
  if (S.secondsLeft <= 0) { clearInterval(S.timerInterval); autoSubmit(); return; }
  updateTimer();
}
function updateTimer() {
  const s = S.secondsLeft;
  const mm = String(Math.floor(s/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  document.getElementById('timer-display').textContent = `${mm}:${ss}`;
  const chip = document.getElementById('timer-chip');
  chip.className = 'timer-chip' + (s < 60 ? ' danger' : s < 300 ? ' warn' : '');
}

// ═══════════════════════════════════════════════════════════
// RENDER QUIZ
// ═══════════════════════════════════════════════════════════
function renderQuiz() {
  const qs = S.questions, idx = S.currentQ, q = qs[idx];
  const answered = Object.keys(S.answers).length;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('total-count').textContent = qs.length;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === qs.length - 1;
  const pct = qs.length ? Math.round(answered / qs.length * 100) : 0;

  render(`
    <div class="progress-section">
      <div class="progress-meta">
        <span>Câu ${idx+1} / ${qs.length}</span>
        <span>${pct}% hoàn thành</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>

    ${buildQuestion(q, idx)}

    <div class="navigator-section">
      <div class="navigator-label">Điều hướng nhanh</div>
      <div class="q-nav-grid">
        ${qs.map((qq,i) => `
          <button class="q-nav-btn ${S.answers[qq.id]!==undefined?'answered':''} ${i===idx?'current':''}"
            onclick="jumpTo(${i})">${i+1}</button>
        `).join('')}
      </div>
    </div>
  `);
}

function buildQuestion(q, idx) {
  const ans = S.answers[q.id];
  const L = 'ABCDE';
  const isAnswered = ans !== undefined;

  let body = '';
  if (q.type === 'multiple_choice') {
    body = `<div class="opt-list">${(q.options||[]).map((opt,oi) => `
      <div class="opt-item ${ans===oi?'selected':''}" onclick="setAns(${q.id},${oi})">
        <div class="opt-letter">${L[oi]||oi+1}</div>
        <div class="opt-text">${esc(opt)}</div>
        <div class="opt-check"></div>
      </div>`).join('')}</div>`;
  } else if (q.type === 'true_false') {
    body = `<div class="tf-grid">
      <div class="tf-option true-opt ${ans===true?'selected-true':''}" onclick="setAns(${q.id},true)">
        <span class="tf-icon">✅</span> Đúng
      </div>
      <div class="tf-option false-opt ${ans===false?'selected-false':''}" onclick="setAns(${q.id},false)">
        <span class="tf-icon">❌</span> Sai
      </div>
    </div>`;
  } else if (q.type === 'short_text') {
    body = `<input class="q-input" type="text" value="${esc(ans||'')}"
      placeholder="Nhập câu trả lời ngắn..."
      oninput="setAns(${q.id},this.value)">`;
  } else if (q.type === 'essay') {
    body = `<textarea class="q-textarea" placeholder="Nhập câu trả lời của bạn..."
      oninput="setAns(${q.id},this.value)">${esc(ans||'')}</textarea>`;
  } else if (q.type === 'rating') {
    const val = ans || 0;
    body = `<div class="rating-wrap">
      ${[1,2,3,4,5].map(n => `
        <button class="star-btn ${n<=val?'active':''}" onclick="setAns(${q.id},${n})" title="${n} sao">⭐</button>
      `).join('')}
      <span class="rating-label">${val?`${val}/5 sao`:''}</span>
    </div>`;
  }

  return `
    <div class="q-card ${isAnswered?'answered':''}">
      <div class="q-card-header">
        <div class="q-number">${idx+1}</div>
        <div class="q-meta">
          <span class="q-points"><i class="fas fa-star" style="font-size:9px"></i> ${q.points||1} điểm</span>
          ${q.isRequired ? '<span class="q-required-tag">Bắt buộc</span>' : ''}
        </div>
      </div>
      <div class="q-content">${esc(q.content||'(Không có nội dung)')}</div>
      ${body}
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════
function setAns(qId, val) {
  S.answers[qId] = val;
  setSaveDot('saving');
  clearTimeout(S._saveDebounce);
  S._saveDebounce = setTimeout(autoSave, 2000);
  renderQuiz();
}
function navQuestion(dir) {
  const n = S.currentQ + dir;
  if (n >= 0 && n < S.questions.length) { S.currentQ = n; renderQuiz(); scrollTo({top:0,behavior:'smooth'}); }
}
function jumpTo(idx) { S.currentQ = idx; renderQuiz(); scrollTo({top:0,behavior:'smooth'}); }

// ═══════════════════════════════════════════════════════════
// AUTO-SAVE
// ═══════════════════════════════════════════════════════════
async function autoSave() {
  if (!S.submission) return;
  setSaveDot('saving');
  const payload = { answers: S.answers };
  try { localStorage.setItem(`${LS_PREFIX}${S.submission.id}`, JSON.stringify(payload)); } catch {}
  try {
    await api(`/api/submissions/${S.submission.id}/save`, { method:'POST', body:JSON.stringify(payload) });
    setSaveDot('saved');
    document.getElementById('save-label').textContent = `Đã lưu ${new Date().toLocaleTimeString('vi-VN')}`;
  } catch { document.getElementById('save-label').textContent = 'Lưu thất bại (cục bộ)'; }
}
function setSaveDot(s) { document.getElementById('save-dot').className = `save-dot ${s}`; }

// ═══════════════════════════════════════════════════════════
// ANTI-CHEAT
// ═══════════════════════════════════════════════════════════
function onVisibility() {
  if (!S.submission || S.phase !== 'quiz') return;
  const type = document.hidden ? 'focus_lost' : 'focus_gained';
  api(`/api/submissions/${S.submission.id}/event`, { method:'POST',
    body: JSON.stringify({ eventType: type, timestamp: new Date().toISOString() })
  }).catch(()=>{});
  if (document.hidden) showToast('⚠️ Cảnh báo: rời tab bị ghi nhận!', 'warn');
}
function onUnload(e) {
  if (S.phase === 'quiz') { autoSave(); e.preventDefault(); e.returnValue = ''; }
}

// ═══════════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════════
function confirmSubmit() {
  const qs = S.questions;
  const unansweredReq = qs.filter(q => q.isRequired && S.answers[q.id] === undefined);
  const unansweredAll = qs.filter(q => S.answers[q.id] === undefined).length;
  if (unansweredReq.length) {
    if (!confirm(`⚠️ Còn ${unansweredReq.length} câu bắt buộc chưa trả lời.\nVẫn nộp bài?`)) return;
  } else if (unansweredAll) {
    if (!confirm(`Bạn chưa trả lời ${unansweredAll} câu.\nNộp bài ngay?`)) return;
  } else {
    if (!confirm(`Xác nhận nộp bài? Bạn đã trả lời đủ ${qs.length} câu.`)) return;
  }
  doSubmit();
}
async function autoSubmit() {
  showToast('⏰ Hết giờ! Đang nộp bài tự động...', 'error');
  await doSubmit(true);
}
async function doSubmit(auto = false) {
  clearInterval(S.timerInterval);
  clearInterval(S.autoSaveTimer);
  clearTimeout(S._saveDebounce);
  document.removeEventListener('visibilitychange', onVisibility);
  window.removeEventListener('beforeunload', onUnload);
  loader(true, 'Đang nộp bài...');
  try {
    await autoSave();
    const data = await api(`/api/submissions/${S.submission.id}/submit`, {
      method:'POST', body: JSON.stringify({ answers: S.answers })
    });
    try { localStorage.removeItem(`${LS_PREFIX}${S.submission.id}`); } catch {}
    loader(false);
    showResult(data);
  } catch(e) {
    loader(false);
    showToast('Lỗi nộp bài: ' + e.message, 'error');
    if (auto) setTimeout(() => doSubmit(true), 4000);
  }
}

// ═══════════════════════════════════════════════════════════
// RESULT
// ═══════════════════════════════════════════════════════════
function showResult(data) {
  S.phase = 'result';
  document.getElementById('quiz-header').style.display = 'none';
  document.getElementById('bottom-bar').style.display = 'none';

  const type = S.assess.assessmentType;
  const isGraded = type === 'graded_quiz' || type === 'graded_survey';
  const isPractice = type === 'practice_quiz';

  api(`/api/submissions/${S.submission.id}/result`).then(result => {
    const score = result.score ?? data.score;
    const maxScore = result.maxScore ?? data.maxScore;
    const correct = result.correctCount ?? data.correctCount;
    const total = result.totalQuestions ?? S.questions.length;
    const elapsed = result.elapsedSeconds || data.elapsedSeconds;
    const pct = maxScore ? Math.round(score/maxScore*100) : null;
    const pass = pct != null ? pct >= 50 : null;
    const elapsedStr = elapsed ? `${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}` : '–';

    render(`
      <div class="result-card">
        <span class="result-emoji">${pass===null?'📋':pass?'🎉':'😔'}</span>
        <h2 class="result-heading">${pass===null?'Đã nộp bài!':pass?'Xuất sắc!':'Chưa đạt'}</h2>
        <p class="result-sub">${pass===null?'Kết quả sẽ được cập nhật sau khi chấm.':pass?'Chúc mừng bạn đã hoàn thành bài kiểm tra!':'Hãy ôn tập và thử lại!'}</p>

        ${isGraded && score != null ? `
          <div class="result-score-wrap">
            <div class="result-score ${pass?'pass':'fail'}">${score}</div>
            <div class="result-score-max">/${maxScore}</div>
          </div>
          ${pct!=null?`<div class="result-pct">${pct}% tổng điểm</div>`:''}
        ` : ''}

        <div class="result-stats">
          ${total ? `<div class="result-stat">
            <div class="val">${correct??'–'}/${total}</div>
            <div class="lbl">Câu đúng</div>
          </div>` : ''}
          <div class="result-stat">
            <div class="val">${elapsedStr}</div>
            <div class="lbl">Thời gian</div>
          </div>
          ${pct!=null?`<div class="result-stat">
            <div class="val" style="color:${pass?'var(--success)':'var(--danger)'}">${pct}%</div>
            <div class="lbl">Tỉ lệ đúng</div>
          </div>`:''}
        </div>

        ${isPractice && result.answers ? buildReview(result) : ''}

        <div class="result-actions">
          <a href="javascript:history.back()" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Quay lại
          </a>
          ${isPractice ? `<button class="btn btn-primary" onclick="location.reload()">
            <i class="fas fa-rotate-right"></i> Làm lại
          </button>` : ''}
        </div>
      </div>
    `);
  }).catch(() => {
    render(`
      <div class="result-card">
        <span class="result-emoji">✅</span>
        <h2 class="result-heading">Đã nộp bài thành công!</h2>
        <p class="result-sub">Kết quả sẽ được cập nhật sau khi giáo viên chấm.</p>
        <div class="result-actions">
          <a href="javascript:history.back()" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Quay lại
          </a>
        </div>
      </div>
    `);
  });
}

function buildReview(result) {
  const L = 'ABCDE';
  return `
    <div class="review-section">
      <div class="review-heading"><i class="fas fa-magnifying-glass"></i> Xem lại bài làm</div>
      ${S.questions.map((q,i) => {
        const a = result.answers?.find(x => x.questionId === q.id);
        const correct = a?.isCorrect;
        const user = a?.answerData;
        const right = a?.correctAnswer;
        const display = v => {
          if (v===undefined||v===null) return '<em style="color:var(--text-subtle)">Chưa trả lời</em>';
          if (q.type==='multiple_choice') { const n=typeof v==='number'?v:parseInt(v); return `${L[n]||n+1}. ${esc(q.options?.[n]||String(v))}`; }
          if (q.type==='true_false') return v===true||v==='true'?'✅ Đúng':'❌ Sai';
          if (q.type==='rating') return `⭐ ${v}/5`;
          return esc(String(v));
        };
        return `<div class="review-item ${correct?'correct':'wrong'}">
          <div class="review-item-header">
            <div class="review-badge">${correct?'✓':'✗'}</div>
            <div class="review-q-text">Câu ${i+1}: ${esc((q.content||'').slice(0,60))}${q.content?.length>60?'...':''}</div>
          </div>
          <div class="review-answers">
            <span>Bạn chọn:</span> <b>${display(user)}</b>
            ${!correct&&right!==undefined?`<br><span>Đáp án đúng:</span> <b class="review-correct-ans">${display(right)}</b>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════
function render(html) { document.getElementById('quiz-shell').innerHTML = html; }

function showError(title, desc='') {
  loader(false);
  document.getElementById('quiz-shell').innerHTML = `
    <div class="error-card">
      <span class="error-icon">⚠️</span>
      <div class="error-title">${title}</div>
      <div class="error-desc">${desc}</div>
      <a href="javascript:history.back()" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Quay lại
      </a>
    </div>`;
}

function loader(show, text='') {
  const el = document.getElementById('loader');
  el.className = `loader ${show?'show':''}`;
  if (text) document.getElementById('loader-text').textContent = text;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastId = 0;
function showToast(msg, type='info') {
  const wrap = document.getElementById('toast-wrap');
  const id = ++_toastId;
  const icons = { success:'fa-check-circle', error:'fa-circle-xmark', warn:'fa-triangle-exclamation', info:'fa-circle-info' };
  const div = document.createElement('div');
  div.className = `toast ${type}`;
  div.innerHTML = `<i class="fas ${icons[type]||icons.info} toast-icon"></i><div class="toast-msg">${msg}</div>`;
  wrap.appendChild(div);
  setTimeout(() => { div.style.opacity='0'; div.style.transform='translateX(16px)'; div.style.transition='all .25s'; setTimeout(()=>div.remove(),260); }, 3500);
}
</script>
