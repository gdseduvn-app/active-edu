# AdaptLearn LMS + AI Agent — Phase 1 Deployment
# Source: SRS-CH02 §2.6.1, SRS-CH06 §6.1.2
version: '3.9'

services:
  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on: [lms-api, web-app]
    restart: unless-stopped

  # ── Next.js Frontend ─────────────────────────────────────
  web-app:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=https://learn.thuthiem.edu.vn/api/v1
      - NEXT_PUBLIC_WS_URL=wss://learn.thuthiem.edu.vn
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── LMS API (Node.js Fastify) ────────────────────────────
  lms-api:
    build:
      context: ./packages/lms-api
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://adaptlearn:${POSTGRES_PASSWORD}@postgres:5432/adaptlearn
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_KEY=${INTERNAL_KEY}
      - AGENT_SERVICE_URL=http://agent:8000
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── AI Agent Service (Python FastAPI) ───────────────────
  agent:
    build:
      context: ./packages/agent
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://adaptlearn:${POSTGRES_PASSWORD}@postgres:5432/adaptlearn
      - REDIS_URL=redis://redis:6379
      - INTERNAL_KEY=${INTERNAL_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Event Processor (Python consumer) ───────────────────
  event-processor:
    build:
      context: ./packages/agent
      dockerfile: Dockerfile.processor
    command: python -m app.processors.event_consumer
    environment:
      - DATABASE_URL=postgresql://adaptlearn:${POSTGRES_PASSWORD}@postgres:5432/adaptlearn
      - REDIS_URL=redis://redis:6379
      - INTERNAL_KEY=${INTERNAL_KEY}
    depends_on:
      - agent
      - redis
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: adaptlearn
      POSTGRES_USER: adaptlearn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/lms-api/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adaptlearn"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (Object Storage) ───────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"  # Console only — not exposed to internet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
