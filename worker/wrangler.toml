name = "activeedu-proxy"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Environment Variables ─────────────────────────────────────
# Set via: wrangler secret put <NAME>
# DO NOT put real values here — use secrets for sensitive data

# [vars]
# ALLOWED_COUNTRIES = "VN"
# ALLOWED_ORIGIN = "https://activelearning.gds.edu.vn"
# NOCO_URL = "https://noco.yourserver.com"
# GDRIVE_FOLDER_ID = ""

# Secrets (set via CLI):
#   wrangler secret put NOCO_TOKEN
#   wrangler secret put NOCO_ARTICLE
#   wrangler secret put NOCO_USERS
#   wrangler secret put NOCO_FOLDERS
#   wrangler secret put NOCO_PERMS
#   wrangler secret put NOCO_PROGRESS
#   wrangler secret put NOCO_QUIZ
#   wrangler secret put NOCO_ANALYTICS
#   wrangler secret put NOCO_COURSES       (Canvas LMS: Courses table ID)
#   wrangler secret put NOCO_MODULES       (Canvas LMS: Modules table ID)
#   wrangler secret put NOCO_QBANK         (Question Bank table ID)
#   wrangler secret put NOCO_EXAMS         (Exams table ID)
#   wrangler secret put NOCO_EXAM_SECTIONS (ExamSections table ID)
#   wrangler secret put ADMIN_PASSWORD
#   wrangler secret put PASS_SALT
#   wrangler secret put TOKEN_SECRET
#   wrangler secret put ANTHROPIC_API_KEY  (Claude Haiku Socratic AI)
#   wrangler secret put GDRIVE_SA_JSON   (optional)
#   wrangler secret put NOCO_AUDIT           (AuditLog table ID)
#   wrangler secret put RESEND_API_KEY       (Resend.com API key — email gửi reset password)
#   wrangler secret put EMAIL_FROM           (optional: "ActiveEdu <no-reply@gds.edu.vn>")
#   wrangler secret put APP_URL              (optional: "https://activelearning.gds.edu.vn")
#
# ── Quizzes & Surveys module (FR-01 to FR-14) ────────────────
#   wrangler secret put NOCO_ASSESSMENTS      → mqqj02yoar19vyp
#   wrangler secret put NOCO_ASSESS_QUESTIONS → mi7xia4503dwksg
#   wrangler secret put NOCO_SUBMISSIONS      → m1ea1g7vgk6t24z
#   wrangler secret put NOCO_SUB_ANSWERS      → me8tjveubb1i36x
#   wrangler secret put NOCO_ACTION_LOGS      → mu704b9cms2jkcd
#
# ── Course Management module (FR-C01 to FR-C11) ──────────────
#   wrangler secret put NOCO_ENROLLMENTS      → m3vjp8zn51kx7e4

# ── Custom Domain ─────────────────────────────────────────────
routes = [
  { pattern = "api.gds.edu.vn/*", zone_name = "gds.edu.vn" }
]

# ── KV namespace for persistent rate limiting (optional) ──────
# Create with: wrangler kv namespace create RATE_LIMIT_KV
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "YOUR_KV_NAMESPACE_ID"

# ── KV namespace for Idempotency-Key deduplication ────────────
[[kv_namespaces]]
binding = "IDEMPOTENCY_KV"
id = "1f074e4f56d848d2b9a8b521daee6e4a"
preview_id = "993796eebb2e45ed9c6586c6d02e4670"

# ── Environments ──────────────────────────────────────────────
[env.staging]
name = "activeedu-worker-staging"
routes = [
  { pattern = "api-staging.gds.edu.vn/*", zone_name = "gds.edu.vn" }
]
