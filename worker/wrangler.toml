name = "activeedu-proxy"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Environment Variables ─────────────────────────────────────
# Set via: wrangler secret put <NAME>
# DO NOT put real values here — use secrets for sensitive data

# [vars]
# ALLOWED_COUNTRIES = "VN"
# ALLOWED_ORIGIN = "https://activelearning.gds.edu.vn"
# NOCO_URL = "https://noco.yourserver.com"
# GDRIVE_FOLDER_ID = ""

# Secrets (set via CLI):
#   wrangler secret put NOCO_TOKEN
#   wrangler secret put NOCO_ARTICLE
#   wrangler secret put NOCO_USERS
#   wrangler secret put NOCO_FOLDERS
#   wrangler secret put NOCO_PERMS
#   wrangler secret put NOCO_PROGRESS
#   wrangler secret put NOCO_QUIZ
#   wrangler secret put NOCO_ANALYTICS
#   wrangler secret put ADMIN_PASSWORD
#   wrangler secret put PASS_SALT
#   wrangler secret put TOKEN_SECRET
#   wrangler secret put GDRIVE_SA_JSON   (optional)

# ── Custom Domain ─────────────────────────────────────────────
routes = [
  { pattern = "api.gds.edu.vn/*", zone_name = "gds.edu.vn" }
]

# ── KV namespace for persistent rate limiting (optional) ──────
# Create with: wrangler kv:namespace create RATE_LIMIT_KV
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "YOUR_KV_NAMESPACE_ID"

# ── Environments ──────────────────────────────────────────────
[env.staging]
name = "activeedu-worker-staging"
routes = [
  { pattern = "api-staging.gds.edu.vn/*", zone_name = "gds.edu.vn" }
]
