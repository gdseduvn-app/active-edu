<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
// Chuyển /bai/slug → /#/bai/slug rồi về index
const path = window.location.pathname;
const m = path.match(/\/bai\/([^/]+)/);
if (m) {
  window.location.replace('/?bai=' + encodeURIComponent(m[1]));
} else {
  window.location.replace('/');
}
</script>
</head>
</html>
