<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ActiveEdu — Tin nhắn</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--primary:#E66000;--primary-dark:#C55500;--primary-light:#FF8C3A;--sidebar-bg:#2D3B45;--topbar-h:58px;--bg:#F5F5F5;--card-bg:#fff;--border:#E1E5E8;--text:#2D3B45;--text-muted:#6B7B8A;--text-subtle:#9AAAB5;--success:#16A34A;--danger:#DC2626;--r:6px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 14px rgba(0,0,0,.10)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;font-size:14px;color:var(--text);background:var(--bg);display:flex;flex-direction:column;height:100vh;overflow:hidden}

.top-nav{height:var(--topbar-h);background:var(--sidebar-bg);display:flex;align-items:center;padding:0 24px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;margin-right:24px;text-decoration:none}
.nav-logo-icon{width:32px;height:32px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
.nav-logo-name{font-weight:700;font-size:16px;color:#fff}.nav-logo-name span{color:var(--primary-light)}
.nav-item{padding:7px 13px;color:rgba(199,211,217,.8);cursor:pointer;border-radius:var(--r);font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;display:flex;align-items:center;gap:7px;text-decoration:none}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(230,96,0,.2);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;border:2px solid rgba(255,255,255,.2);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* INBOX LAYOUT */
.inbox{display:flex;flex:1;overflow:hidden}
.conv-panel{width:300px;flex-shrink:0;border-right:1px solid var(--border);background:#fff;display:flex;flex-direction:column}
.conv-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.conv-panel-title{font-size:15px;font-weight:700}
.btn-compose{padding:7px 13px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .15s}
.btn-compose:hover{background:var(--primary-dark)}
.conv-search{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.conv-search input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:13px;outline:none}
.conv-search input:focus{border-color:var(--primary)}
.conv-list{flex:1;overflow-y:auto}
.conv-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.conv-item:hover{background:#F8F9FA}
.conv-item.active{background:#FFF7F3;border-left:3px solid var(--primary)}
.conv-item-subject{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item-preview{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.conv-item-time{font-size:11px;color:var(--text-subtle)}
.conv-unread{width:8px;height:8px;background:var(--primary);border-radius:50%;flex-shrink:0}

/* THREAD PANEL */
.thread-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.thread-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text-muted)}
.thread-empty i{font-size:48px;opacity:.2;margin-bottom:14px}
.thread-header{padding:14px 20px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.thread-subject{font-size:16px;font-weight:700}
.thread-participants{font-size:12px;color:var(--text-muted);margin-top:3px}
.thread-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;gap:10px}
.msg-row.mine{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg-bubble{max-width:68%;background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px 13px;box-shadow:var(--shadow)}
.msg-row.mine .msg-bubble{background:var(--primary);color:#fff;border-color:var(--primary)}
.msg-sender{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:3px}
.msg-row.mine .msg-sender{color:rgba(255,255,255,.7)}
.msg-text{font-size:13px;line-height:1.6;white-space:pre-wrap}
.msg-time{font-size:11px;color:var(--text-subtle);margin-top:4px;text-align:right}
.msg-row.mine .msg-time{color:rgba(255,255,255,.6)}

/* REPLY BAR */
.reply-bar{padding:12px 20px;background:#fff;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.reply-bar textarea{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:13px;resize:none;outline:none;min-height:40px;max-height:120px;transition:border .15s}
.reply-bar textarea:focus{border-color:var(--primary)}
.btn-send{padding:9px 16px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;flex-shrink:0}
.btn-send:hover{background:var(--primary-dark)}

/* COMPOSE MODAL */
.modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:12px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted);padding:4px}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.form-row label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:4px}
.form-row input,.form-row textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:13px;outline:none;transition:border .15s}
.form-row input:focus,.form-row textarea:focus{border-color:var(--primary)}
.form-row textarea{resize:vertical;min-height:100px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-sm{padding:7px 16px;border-radius:var(--r);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-ghost{background:none;border:1.5px solid var(--border);color:var(--text-muted)}.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.err{color:var(--danger);font-size:12px;margin-top:4px;display:none}

@media(max-width:640px){.conv-panel{width:100%;position:fixed;inset:var(--topbar-h) 0 0;z-index:50;transform:translateX(-100%);transition:transform .2s}.conv-panel.open{transform:none}}
</style>
</head>
<body>

<nav class="top-nav">
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon"><i class="fas fa-bolt"></i></div>
    <span class="nav-logo-name">Active<span>Edu</span></span>
  </a>
  <a class="nav-item" href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
  <a class="nav-item" href="discussions.html"><i class="fas fa-comments"></i> Thảo luận</a>
  <a class="nav-item active" href="#"><i class="fas fa-envelope"></i> Tin nhắn</a>
  <a class="nav-item" href="calendar.html"><i class="fas fa-calendar"></i> Lịch</a>
  <div class="nav-right">
    <div class="nav-avatar" id="nav-avatar">?</div>
    <span id="nav-username" style="font-size:13px;color:rgba(199,211,217,.9);font-weight:500"></span>
  </div>
</nav>

<div class="inbox">
  <!-- CONVERSATION LIST -->
  <div class="conv-panel">
    <div class="conv-panel-header">
      <span class="conv-panel-title"><i class="fas fa-inbox" style="color:var(--primary)"></i> Hộp thư</span>
      <button class="btn-compose" onclick="openCompose()"><i class="fas fa-pen"></i> Soạn</button>
    </div>
    <div class="conv-search">
      <input type="text" id="conv-search" placeholder="Tìm cuộc trò chuyện..." oninput="filterConvs()">
    </div>
    <div class="conv-list" id="conv-list">
      <div style="padding:30px;text-align:center;color:var(--text-muted)"><i class="fas fa-spinner fa-spin"></i></div>
    </div>
  </div>

  <!-- MESSAGE THREAD -->
  <div class="thread-panel" id="thread-panel">
    <div class="thread-empty" id="thread-empty">
      <i class="fas fa-envelope-open-text"></i>
      <p style="font-size:15px;font-weight:600">Chọn một cuộc trò chuyện</p>
      <p style="font-size:13px;margin-top:4px">hoặc soạn tin nhắn mới</p>
    </div>
    <div id="thread-content" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="thread-header">
        <div class="thread-subject" id="thread-subject"></div>
        <div class="thread-participants" id="thread-participants"></div>
      </div>
      <div class="thread-msgs" id="thread-msgs"></div>
      <div class="reply-bar">
        <textarea id="reply-input" placeholder="Nhập tin nhắn..." rows="1" oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"></textarea>
        <button class="btn-send" onclick="sendReply()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- COMPOSE MODAL -->
<div class="modal" id="modal-compose">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="fas fa-pen" style="color:var(--primary)"></i> Tin nhắn mới</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Người nhận (Email) *</label>
        <input type="text" id="compose-to" placeholder="email@gds.edu.vn (nhiều người: cách nhau bằng dấu phẩy)">
      </div>
      <div class="form-row">
        <label>Tiêu đề *</label>
        <input type="text" id="compose-subject" placeholder="Tiêu đề cuộc trò chuyện...">
      </div>
      <div class="form-row">
        <label>Nội dung *</label>
        <textarea id="compose-body" placeholder="Nhập nội dung tin nhắn..."></textarea>
      </div>
      <div class="err" id="compose-err"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm btn-ghost" onclick="closeModal()">Hủy</button>
      <button class="btn-sm btn-primary" onclick="sendNewMessage()"><i class="fas fa-paper-plane"></i> Gửi</button>
    </div>
  </div>
</div>

<script>
const API = 'https://api.gds.edu.vn';
let currentUser = null;
let currentConvId = null;
let allConvs = [];

function getToken(){ return localStorage.getItem('ae_token'); }
async function api(path, opts={}){
  const headers={'Content-Type':'application/json'};
  const t=getToken(); if(t) headers['Authorization']='Bearer '+t;
  const r=await fetch(API+path,{...opts,headers}); return r.json();
}
function avatarLetter(s){ return (s||'?')[0].toUpperCase(); }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(iso){
  if(!iso) return '';
  const d=new Date(iso);
  const now=new Date();
  if(d.toDateString()===now.toDateString()) return d.toLocaleTimeString('vi',{hour:'2-digit',minute:'2-digit'});
  const diff=Math.floor((now-d)/86400000);
  if(diff===1) return 'Hôm qua';
  if(diff<7) return diff+' ngày trước';
  return d.toLocaleDateString('vi');
}
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

async function init(){
  if(!getToken()){window.location.href='login.html';return;}
  currentUser=JSON.parse(localStorage.getItem('ae_user')||'{}');
  document.getElementById('nav-avatar').textContent=avatarLetter(currentUser.email);
  document.getElementById('nav-username').textContent=currentUser.email||'';
  loadConversations();
}

async function loadConversations(){
  const data=await api('/api/messages/conversations');
  allConvs=data.conversations||[];
  renderConvList(allConvs);
}

function renderConvList(convs){
  const el=document.getElementById('conv-list');
  if(convs.length===0){
    el.innerHTML='<div style="padding:30px;text-align:center;color:var(--text-muted)"><i class="fas fa-inbox" style="font-size:32px;opacity:.2;display:block;margin-bottom:8px"></i>Chưa có tin nhắn nào</div>';
    return;
  }
  el.innerHTML=convs.map(c=>{
    const isActive=c.Id==currentConvId;
    const unread=c.UnreadCount>0;
    return `<div class="conv-item${isActive?' active':''}" onclick="openConv(${c.Id})">
      <div class="conv-item-meta">
        <span class="conv-item-subject" style="${unread?'font-weight:700':''}">${escHtml(c.Subject||'(Không có tiêu đề)')}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="conv-item-time">${timeAgo(c.UpdatedAt||c.CreatedAt)}</span>
          ${unread?'<span class="conv-unread"></span>':''}
        </div>
      </div>
      <div class="conv-item-preview">${escHtml(c.LastMessage||'')}</div>
    </div>`;
  }).join('');
}

function filterConvs(){
  const q=document.getElementById('conv-search').value.toLowerCase();
  renderConvList(allConvs.filter(c=>(c.Subject||'').toLowerCase().includes(q)));
}

async function openConv(convId){
  currentConvId=convId;
  renderConvList(allConvs); // highlight
  document.getElementById('thread-empty').style.display='none';
  const tc=document.getElementById('thread-content');
  tc.style.display='flex';
  document.getElementById('thread-msgs').innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted)"><i class="fas fa-spinner fa-spin"></i></div>';

  const data=await api(`/api/messages/conversations/${convId}`);
  const conv=data.conversation||{};
  const msgs=data.messages||[];

  document.getElementById('thread-subject').textContent=conv.Subject||'(Không có tiêu đề)';
  document.getElementById('thread-participants').textContent='Người tham gia: '+(data.participants||[]).map(p=>p.Email||p.UserId).join(', ');

  const msgsEl=document.getElementById('thread-msgs');
  msgsEl.innerHTML=msgs.map(m=>{
    const isMine=String(m.SenderId)===String(currentUser.userId||currentUser.id);
    return `<div class="msg-row${isMine?' mine':''}">
      <div class="msg-avatar">${avatarLetter(m.SenderEmail||'?')}</div>
      <div class="msg-bubble">
        <div class="msg-sender">${escHtml(m.SenderEmail||m.SenderId||'')}</div>
        <div class="msg-text">${escHtml(m.Body||'')}</div>
        <div class="msg-time">${timeAgo(m.SentAt)}</div>
      </div>
    </div>`;
  }).join('');
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

async function sendReply(){
  const body=document.getElementById('reply-input').value.trim();
  if(!body||!currentConvId) return;
  const data=await api(`/api/messages/${currentConvId}/reply`,{method:'POST',body:JSON.stringify({body})});
  if(data.ok){
    document.getElementById('reply-input').value='';
    document.getElementById('reply-input').style.height='auto';
    openConv(currentConvId);
    loadConversations();
  } else alert(data.error||'Không thể gửi tin nhắn');
}

function openCompose(){
  document.getElementById('compose-to').value='';
  document.getElementById('compose-subject').value='';
  document.getElementById('compose-body').value='';
  document.getElementById('compose-err').style.display='none';
  document.getElementById('modal-compose').classList.add('show');
}

async function sendNewMessage(){
  const toRaw=document.getElementById('compose-to').value.trim();
  const subject=document.getElementById('compose-subject').value.trim();
  const body=document.getElementById('compose-body').value.trim();
  const err=document.getElementById('compose-err');
  if(!toRaw){err.textContent='Vui lòng nhập người nhận';err.style.display='block';return;}
  if(!subject){err.textContent='Vui lòng nhập tiêu đề';err.style.display='block';return;}
  if(!body){err.textContent='Vui lòng nhập nội dung';err.style.display='block';return;}
  err.style.display='none';

  // Parse recipients — emails
  const recipients=toRaw.split(',').map(s=>s.trim()).filter(Boolean);
  const data=await api('/api/messages',{method:'POST',body:JSON.stringify({to:recipients,subject,body})});
  if(data.ok){
    closeModal();
    loadConversations();
    if(data.conversation_id) openConv(data.conversation_id);
  } else { err.textContent=data.error||'Không thể gửi tin nhắn'; err.style.display='block'; }
}

function closeModal(){ document.getElementById('modal-compose').classList.remove('show'); }
init();
</script>
</body>
</html>
