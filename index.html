<!DOCTYPE html>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Styles cho trang Portal */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        
        /* Styles dùng chung cho các bài Active Learning (được nhúng vào) */
        .reveal-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.5s ease-out;
            opacity: 0;
        }
        .reveal-content.active {
            max-height: 1000px;
            opacity: 1;
        }
        .ball-drop {
            width: 20px;
            height: 20px;
            background-color: #ef4444;
            border-radius: 50%;
            position: relative;
            animation: bounce 2s infinite ease-in;
        }
        @keyframes bounce {
            0% { top: 0; }
            50% { top: 150px; }
            100% { top: 0; }
        }
        .flow-line {
            width: 2px;
            height: 30px;
            background-color: #3b82f6;
            margin: 0 auto;
        }
    </style>
</head>

            <div class="bg-blue-50 rounded-xl p-4 border border-blue-100 mb-6">
                <h3 class="font-bold mb-2">Bài toán mẫu (Đề 4.3):</h3>
                <p class="text-sm">Lớp 9A trồng <b>420 cây</b>. Lúc thực hiện có <b>5 bạn vắng</b> nên mỗi bạn còn lại phải trồng <b>thêm 2 cây</b>. Hỏi số HS của lớp?</p>
            </div>

            <div class="border rounded-xl p-4 mb-6 border-slate-200 bg-white">

                <div class="grid grid-cols-4 gap-1 text-center text-sm mb-4">
                    <div class="bg-slate-200 p-2 font-bold rounded-tl-lg text-xs">Đại lượng</div>
                    <div class="bg-slate-200 p-2 font-bold text-blue-600 text-xs">Tổng cây</div>

                    <ul class="list-disc ml-5 mt-2 text-sm">
                        <li>a) Viết biểu thức A tính diện tích đất làm nhà theo y.</li>
                        <li>b) Nếu diện tích nhà = 400m², tìm y.</li>
                    </ul>
                </div>
                <!-- Graphic -->

                <button onclick="toggleReveal('hint3')" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-sm font-bold hover:bg-blue-200 transition">Hiển thị Phép tính</button>

                        <div class="bg-white p-3 rounded border border-blue-200 shadow-sm">
                            <div class="text-xs text-slate-500 uppercase font-bold mb-1">Chiều Rộng Nhà</div>
                            <div class="font-mono text-green-700 font-bold"><br>= 24 - y</div>
                        </div>
                    </div>

                    </div>

                tags: ['Toán 9', 'Hình học'],
                date: 'Dự kiến',
                templateId: 'tpl-coming-soon'
            },
            {
                id: 'toan9-bai1',
                title: 'Hệ phương trình bậc nhất 2 ẩn',
                description: 'Mẹo bấm máy tính kiểm tra và cách trình bày lấy trọn điểm.',
                icon: 'fas fa-calculator',
                color: 'bg-teal-500',
                tags: ['Toán 9', 'Đại số'],
                date: 'Dự kiến',
                templateId: 'tpl-coming-soon'
            }
        ];

        // 2. HIỂN THỊ DANH SÁCH BÀI HỌC Ở TRANG CHỦ
        function renderCourses() {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = ''; // Clear cũ
            
            courses.forEach(course => {
                const tagsHtml = course.tags.map(tag => 
                    `<span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded-md font-medium border border-slate-200">${tag}</span>`
                ).join('');

                const cardHtml = `
                    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden card-hover cursor-pointer shadow-sm flex flex-col h-full" onclick="openLesson('${course.id}')">
                        <div class="h-32 ${course.color} flex items-center justify-center relative overflow-hidden">
                            <div class="absolute w-32 h-32 bg-white opacity-10 rounded-full -right-10 -top-10"></div>
                            <div class="absolute w-24 h-24 bg-white opacity-10 rounded-full -left-5 -bottom-5"></div>
                            <i class="${course.icon} text-5xl text-white opacity-90 relative z-10 drop-shadow-md"></i>
                        </div>
                        <div class="p-6 flex flex-col flex-1">
                            <div class="flex gap-2 mb-3">
                                ${tagsHtml}
                            </div>
                            <h3 class="text-xl font-bold text-slate-800 mb-2">${course.title}</h3>
                            <p class="text-slate-500 text-sm mb-4 flex-1 line-clamp-2">${course.description}</p>
                            <div class="flex items-center justify-between text-xs text-slate-400 font-medium pt-4 border-t border-slate-100">
                                <span><i class="far fa-calendar-alt mr-1"></i> ${course.date}</span>
                                <span class="text-blue-600 font-bold group">Học ngay <i class="fas fa-arrow-right ml-1 transform group-hover:translate-x-1 transition"></i></span>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        }

        // 3. LOGIC CHUYỂN TRANG
        const homeView = document.getElementById('home-view');
        const lessonView = document.getElementById('lesson-view');
        const container = document.getElementById('lesson-content-container');

        function showHome() {
            lessonView.classList.add('hidden');
            homeView.classList.remove('hidden');
            document.getElementById('main-scroll-area').scrollTop = 0;
        }

        function openLesson(id) {
            // Tìm data bài học
            const course = courses.find(c => c.id === id);
            if (!course) return;

            // Cập nhật Header Bài học
            document.getElementById('lesson-title').innerText = course.title;
            const tagsHtml = course.tags.map(tag => `<span class="px-2 py-1 bg-white border border-blue-200 text-blue-700 text-xs rounded font-bold">${tag}</span>`).join('');
            document.getElementById('lesson-tags').innerHTML = tagsHtml;

            // Clone nội dung từ Template và Inject vào DOM
            const template = document.getElementById(course.templateId);
            container.innerHTML = ''; // Xóa nội dung cũ
            
            if (template) {
                const clone = template.content.cloneNode(true);
                container.appendChild(clone);
            } else {
                container.innerHTML = `<div class="text-red-500 p-4">Lỗi: Không tìm thấy nội dung template ID: ${course.templateId}</div>`;
            }

            // Đổi màn hình
            homeView.classList.add('hidden');
            lessonView.classList.remove('hidden');
            document.getElementById('main-scroll-area').scrollTop = 0;
        }

        // ==========================================
        // CÁC HÀM TƯƠNG TÁC BÊN TRONG BÀI HỌC (ACTIVE LEARNING)
        // Lưu ý: Các hàm này phải là biến global (window.xxx) để onClick trong template gọi được
        // ==========================================
        
        window.switchTab = function(tabId) {
            document.querySelectorAll('#lesson-content-container .tab-content').forEach(el => {
                el.classList.add('hidden');
            });
            document.querySelectorAll('#lesson-content-container .tab-btn').forEach(el => {
                el.classList.remove('bg-blue-600', 'text-white');
                el.classList.add('bg-slate-100', 'text-slate-600');
            });
            
            const selectedContent = document.getElementById(tabId);
            if(selectedContent) selectedContent.classList.remove('hidden');
            
            const activeBtn = document.getElementById('tab-' + tabId);
            if(activeBtn) {
                activeBtn.classList.remove('bg-slate-100', 'text-slate-600');
                activeBtn.classList.add('bg-blue-600', 'text-white');
            }
        };

        window.toggleReveal = function(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.toggle('active');
            }
        };

        // Khởi tạo ban đầu
        renderCourses();
    </script>
</body>
</html>
